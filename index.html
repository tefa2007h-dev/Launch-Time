<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو أبويا - الوجبات البيتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yas-red: #E31E24; --yas-yellow: #FFD200; }
        body { 
            background: #000;
            background-image: 
                linear-gradient(to bottom, #000 45%, transparent 50%),
                linear-gradient(rgba(227, 30, 36, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(227, 30, 36, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 25px 25px, 25px 25px;
            color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; 
        }
        .container { max-width: 600px; margin: auto; }
        .section-title { 
            color: var(--yas-yellow); text-align: center; margin: 30px 0 15px; 
            font-size: 1.6rem; font-weight: 900; background: var(--yas-red); 
            padding: 5px; border-radius: 8px;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: rgba(20, 20, 20, 0.95); border-radius: 12px; overflow: hidden; text-align: center; border: 1px solid #444; padding-bottom: 10px; }
        .item-card h3 { font-size: 1.1rem; margin: 15px 0; font-weight: 700; color: #fff; }
        .price-box { background: var(--yas-red); color: #fff; font-weight: 900; padding: 5px 10px; border-radius: 5px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="section-title">وجباتنا المميزة</h2>
    <div class="menu-grid">
        <div class="item-card">
            <h3>وجبة محشي</h3>
            <div class="price-box">150 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة مكرونة بشاميل</h3>
            <div class="price-box">140 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة أرز وفراخ</h3>
            <div class="price-box">130 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة أرز وكفتة</h3>
            <div class="price-box">130 LE</div>
        </div>
    </div>

    <h2 class="section-title">وجبات التوفير</h2>
    <div class="menu-grid">
        <div class="item-card">
            <h3>وجبة خضار</h3>
            <div class="price-box">110 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة نواشف</h3>
            <div class="price-box">110 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة كشري بيتي</h3>
            <div class="price-box">110 LE</div>
        </div>
        <div class="item-card">
            <h3>وجبة عدس</h3>
            <div class="price-box">110 LE</div>
        </div>
    </div>
</div>

</body>
</html>
